{
  "target": "linux/amd64",
  "http": "127.0.0.1:50001",
  "workdir": "/work/syzkaller/workdir-bpf-sched",
  "kernel_obj": "/work/linux/build-latest",
  "kernel_src": "/work/linux/source",
  "image": "/work/initramfs/build/syzimg.img",
  "sshkey": "/work/initramfs/build/syzimg.id_rsa",
  "syzkaller": "/opt/syzkaller",
  "procs": 6,
  "type": "qemu",
  "vm": {
    "count": 6,
    "kernel": "/work/artifacts/bzImage-latest",
    "cpu": 2,
    "mem": 2048,
    "cmdline": "net.ifnames=0",
    "qemu_args": "-enable-kvm -cpu host"
  },
  "reproduce": true,
  "cover": true,
  "sandbox": "none",
  "enable_syscalls": [
    "bpf$*",
    "bpf",
    "perf_event_open$*",
    "perf_event_open",
    "socket$inet_tcp",
    "socket$inet_udp",
    "socket$nl_route",
    "sendmsg$nl_route",
    "syz_genetlink_get_family_id$*"
  ],
  "disable_syscalls": [
    "syz_io_uring_*",
    "io_uring_*",
    "syz_emit_ethernet"
  ]
}
