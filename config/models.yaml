# Model serving config (PLAN §1). Phase 0.2 brings this up; downstream phases
# read role -> endpoint mappings from here.
#
# 4 GPUs total (RTX A6000 49GB each on this host). Default layout:
#   GPUs 0-1 -> synthesizer replica A (TP=2)
#   GPUs 2-3 -> synthesizer replica B (TP=2)
#   router co-located, quantized.

serving:
  backend: vllm           # vllm | sglang
  image: vllm/vllm-openai:v0.11.1   # mirrors docs/toolchain.lock VLLM_IMAGE
  gateway_port: 8000
  prefix_caching: true
  continuous_batching: true
  # Profile selector. `production` brings up the role layout below; `smoke` brings
  # up a single small cached model on one GPU — used by Phase 0.2 to verify the
  # serving + gateway path without downloading 32B weights.
  profile: smoke

# Smoke profile — single replica serving both synthesizer + router roles via the
# gateway. Originally Qwen2.5-3B for fast CI; bumped to DeepSeek-R1-Distill-Llama-70B
# for the leaderboard re-run (4× A6000, TP=4 across all GPUs, FP16 ~140 GB weights).
smoke:
  model: deepseek-ai/DeepSeek-R1-Distill-Llama-70B
  port: 8100
  gpus: [0, 1, 2, 3]
  tensor_parallel: 4
  max_model_len: 16384
  gpu_memory_utilization: 0.85

roles:
  synthesizer:
    model: Qwen/Qwen2.5-Coder-32B-Instruct
    tensor_parallel: 2
    replicas:
      - gpus: [0, 1]
        port: 8101
      - gpus: [2, 3]
        port: 8102
    quantization: none
    max_model_len: 32768
  router:
    model: Qwen/Qwen2.5-Coder-7B-Instruct
    tensor_parallel: 1
    replicas:
      - gpus: [0]     # co-located; Phase 0.2 verifies VRAM fit before promoting
        port: 8201
    quantization: fp8
    max_model_len: 16384

# Optional embedding/reranker over the target repo to use spare GPU capacity.
embeddings:
  enabled: false
  model: BAAI/bge-large-en-v1.5
  port: 8301
